    put:
      summary: Update rate limit configuration
      description: Update rate limit settings for endpoints
      operationId: updateRateLimits
      tags:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateLimitConfig'
      responses:
        '200':
          description: Rate limits updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitConfig'
        '400':
          description: Invalid rate limit configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        uptime:
          type: number
          description: Uptime in seconds
        services:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [healthy, degraded, unhealthy]
              responseTime:
                type: number
                description: Response time in milliseconds
              lastCheck:
                type: string
                format: date-time
      required:
        - status
        - timestamp
        - version
        - uptime

    MetricsResponse:
      type: object
      properties:
        requestCount:
          type: object
          additionalProperties:
            type: number
        responseTime:
          type: object
          properties:
            average:
              type: number
            p95:
              type: number
            p99:
              type: number
        errorRate:
          type: object
          additionalProperties:
            type: number
        rateLimitHits:
          type: object
          additionalProperties:
            type: number
        activeConnections:
          type: number
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        rememberMe:
          type: boolean
          default: false
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token
        refreshToken:
          type: string
          description: JWT refresh token
        expiresIn:
          type: number
          description: Token expiration time in seconds
        tokenType:
          type: string
          default: Bearer
        user:
          $ref: '#/components/schemas/UserProfile'
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType
        - user

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - message
        - timestamp

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: JWT refresh token
      required:
        - refreshToken

    RefreshTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: New JWT access token
        refreshToken:
          type: string
          description: New JWT refresh token
        expiresIn:
          type: number
          description: Token expiration time in seconds
        tokenType:
          type: string
          default: Bearer
      required:
        - accessToken
        - refreshToken
        - expiresIn
        - tokenType

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - roles
        - permissions

    ServiceListResponse:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceInfo'
        total:
          type: integer
        timestamp:
          type: string
          format: date-time
      required:
        - services
        - total
        - timestamp

    ServiceInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [healthy, degraded, unhealthy, unknown]
        url:
          type: string
          format: uri
        healthCheckUrl:
          type: string
          format: uri
        lastHealthCheck:
          type: string
          format: date-time
        responseTime:
          type: number
          description: Average response time in milliseconds
        registeredAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - version
        - status
        - url

    ServiceDetailsResponse:
      type: object
      properties:
        service:
          $ref: '#/components/schemas/ServiceInfo'
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/EndpointInfo'
        metrics:
          type: object
          properties:
            requestCount:
              type: number
            errorCount:
              type: number
            averageResponseTime:
              type: number
            lastHour:
              type: object
              properties:
                requests:
                  type: number
                errors:
                  type: number
        configuration:
          type: object
          additionalProperties: true
      required:
        - service
        - endpoints
        - metrics

    EndpointInfo:
      type: object
      properties:
        path:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
        description:
          type: string
        rateLimitEnabled:
          type: boolean
        rateLimitConfig:
          $ref: '#/components/schemas/RateLimitEndpointConfig'
      required:
        - path
        - method

    RateLimitConfig:
      type: object
      properties:
        global:
          $ref: '#/components/schemas/RateLimitGlobalConfig'
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitEndpointConfig'
        ipWhitelist:
          type: array
          items:
            type: string
        ipBlacklist:
          type: array
          items:
            type: string
      required:
        - global
        - endpoints

    RateLimitGlobalConfig:
      type: object
      properties:
        enabled:
          type: boolean
        requestsPerMinute:
          type: number
        requestsPerHour:
          type: number
        requestsPerDay:
          type: number
        burstLimit:
          type: number
      required:
        - enabled

    RateLimitEndpointConfig:
      type: object
      properties:
        path:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS, '*']
        requestsPerMinute:
          type: number
        requestsPerHour:
          type: number
        requestsPerDay:
          type: number
        burstLimit:
          type: number
        enabled:
          type: boolean
      required:
        - path
        - method
        - enabled

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        requestId:
          type: string
        details:
          type: object
      required:
        - error
        - message
        - timestamp

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Gateway health and status endpoints
  - name: Metrics
    description: Operational metrics and monitoring
  - name: Authentication
    description: User authentication and authorization
  - name: Service Proxy
    description: Service proxy endpoints for all CycleTime services
  - name: Admin
    description: Administrative endpoints for gateway management