asyncapi: 2.6.0
info:
  title: Contract Generation Engine Events
  version: 1.0.0
  description: Event-driven communication for the Contract Generation Engine
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  development:
    url: localhost:6379
    protocol: redis
    description: Development Redis server
  production:
    url: redis.cycletime.dev:6379
    protocol: redis
    description: Production Redis server

defaultContentType: application/json

channels:
  contract/generated:
    description: Contract generation completed
    publish:
      operationId: publishContractGenerated
      message:
        $ref: '#/components/messages/ContractGenerated'

  contract/validated:
    description: Contract validation completed
    publish:
      operationId: publishContractValidated
      message:
        $ref: '#/components/messages/ContractValidated'

  contract/published:
    description: Contract published and available
    publish:
      operationId: publishContractPublished
      message:
        $ref: '#/components/messages/ContractPublished'

  contract/failed:
    description: Contract generation failed
    publish:
      operationId: publishContractFailed
      message:
        $ref: '#/components/messages/ContractFailed'

  boundary/analyzed:
    description: System boundary analysis completed
    publish:
      operationId: publishBoundaryAnalyzed
      message:
        $ref: '#/components/messages/BoundaryAnalyzed'

  requirement/updated:
    description: Requirements updated, trigger contract regeneration
    subscribe:
      operationId: handleRequirementUpdated
      message:
        $ref: '#/components/messages/RequirementUpdated'

  architecture/changed:
    description: Architecture changed, trigger contract updates
    subscribe:
      operationId: handleArchitectureChanged
      message:
        $ref: '#/components/messages/ArchitectureChanged'

  service/defined:
    description: New service defined, generate contract
    subscribe:
      operationId: handleServiceDefined
      message:
        $ref: '#/components/messages/ServiceDefined'

components:
  messages:
    ContractGenerated:
      name: contract.generated
      title: Contract Generated
      summary: A contract has been successfully generated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ContractGeneratedPayload'

    ContractValidated:
      name: contract.validated
      title: Contract Validated
      summary: A contract has been validated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ContractValidatedPayload'

    ContractPublished:
      name: contract.published
      title: Contract Published
      summary: A contract has been published and is available
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ContractPublishedPayload'

    ContractFailed:
      name: contract.failed
      title: Contract Generation Failed
      summary: Contract generation has failed
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ContractFailedPayload'

    BoundaryAnalyzed:
      name: boundary.analyzed
      title: System Boundary Analyzed
      summary: System boundary analysis has been completed
      contentType: application/json
      payload:
        $ref: '#/components/schemas/BoundaryAnalyzedPayload'

    RequirementUpdated:
      name: requirement.updated
      title: Requirement Updated
      summary: Service requirements have been updated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/RequirementUpdatedPayload'

    ArchitectureChanged:
      name: architecture.changed
      title: Architecture Changed
      summary: System architecture has been modified
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ArchitectureChangedPayload'

    ServiceDefined:
      name: service.defined
      title: Service Defined
      summary: A new service has been defined
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ServiceDefinedPayload'

  schemas:
    ContractGeneratedPayload:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          description: Unique identifier for the contract
        serviceName:
          type: string
          description: Name of the service
        serviceType:
          type: string
          enum: [rest-api, event-driven, hybrid, cli, web-ui]
          description: Type of service
        openapi:
          type: object
          description: Generated OpenAPI specification
        asyncapi:
          type: object
          description: Generated AsyncAPI specification
        boundaries:
          type: object
          description: System boundaries and dependencies
        generatedAt:
          type: string
          format: date-time
          description: When the contract was generated
        generatedBy:
          type: string
          description: User or system that generated the contract
        metadata:
          type: object
          description: Additional metadata about the contract
      required:
        - contractId
        - serviceName
        - serviceType
        - generatedAt
        - generatedBy

    ContractValidatedPayload:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          description: Unique identifier for the contract
        serviceName:
          type: string
          description: Name of the service
        valid:
          type: boolean
          description: Whether the contract is valid
        score:
          type: number
          minimum: 0
          maximum: 100
          description: Validation score
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              path:
                type: string
              severity:
                type: string
                enum: [error, warning, info]
        warnings:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              path:
                type: string
              recommendation:
                type: string
        validatedAt:
          type: string
          format: date-time
          description: When the contract was validated
        validatedBy:
          type: string
          description: User or system that validated the contract
      required:
        - contractId
        - serviceName
        - valid
        - score
        - errors
        - warnings
        - validatedAt
        - validatedBy

    ContractPublishedPayload:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          description: Unique identifier for the contract
        serviceName:
          type: string
          description: Name of the service
        version:
          type: string
          description: Contract version
        specificationUrl:
          type: string
          format: uri
          description: URL to access the specification
        documentationUrl:
          type: string
          format: uri
          description: URL to access the documentation
        publishedAt:
          type: string
          format: date-time
          description: When the contract was published
        publishedBy:
          type: string
          description: User or system that published the contract
        tags:
          type: array
          items:
            type: string
          description: Contract tags
      required:
        - contractId
        - serviceName
        - version
        - specificationUrl
        - publishedAt
        - publishedBy

    ContractFailedPayload:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
          description: Unique identifier for the contract
        serviceName:
          type: string
          description: Name of the service
        error:
          type: string
          description: Error message
        errorCode:
          type: string
          description: Error code
        stage:
          type: string
          description: Stage where the failure occurred
        details:
          type: object
          description: Additional error details
        failedAt:
          type: string
          format: date-time
          description: When the contract generation failed
        retryable:
          type: boolean
          description: Whether the operation can be retried
        retryCount:
          type: integer
          description: Number of retry attempts
      required:
        - contractId
        - serviceName
        - error
        - errorCode
        - stage
        - failedAt
        - retryable
        - retryCount

    BoundaryAnalyzedPayload:
      type: object
      properties:
        analysisId:
          type: string
          format: uuid
          description: Unique identifier for the analysis
        services:
          type: array
          items:
            type: string
          description: Services included in the analysis
        boundaries:
          type: object
          description: Identified service boundaries
        interactions:
          type: array
          items:
            type: object
            properties:
              from:
                type: string
              to:
                type: string
              type:
                type: string
                enum: [synchronous, asynchronous, batch, streaming]
              protocol:
                type: string
              dataFlow:
                type: string
              frequency:
                type: string
                enum: [rare, occasional, frequent, constant]
        recommendations:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [split-service, merge-services, extract-shared-component, add-gateway, add-cache]
              description:
                type: string
              rationale:
                type: string
              impact:
                type: string
                enum: [low, medium, high]
              effort:
                type: string
                enum: [low, medium, high]
        analyzedAt:
          type: string
          format: date-time
          description: When the analysis was completed
        analyzedBy:
          type: string
          description: User or system that performed the analysis
      required:
        - analysisId
        - services
        - boundaries
        - interactions
        - recommendations
        - analyzedAt
        - analyzedBy

    RequirementUpdatedPayload:
      type: object
      properties:
        requirementId:
          type: string
          format: uuid
          description: Unique identifier for the requirement
        serviceName:
          type: string
          description: Name of the affected service
        changeType:
          type: string
          enum: [added, modified, removed]
          description: Type of change
        requirements:
          type: string
          description: Updated requirements
        previousRequirements:
          type: string
          description: Previous requirements (for comparison)
        impact:
          type: string
          enum: [low, medium, high]
          description: Impact level of the change
        updatedAt:
          type: string
          format: date-time
          description: When the requirement was updated
        updatedBy:
          type: string
          description: User or system that updated the requirement
        triggerRegeneration:
          type: boolean
          description: Whether to trigger contract regeneration
      required:
        - requirementId
        - serviceName
        - changeType
        - requirements
        - impact
        - updatedAt
        - updatedBy
        - triggerRegeneration

    ArchitectureChangedPayload:
      type: object
      properties:
        architectureId:
          type: string
          format: uuid
          description: Unique identifier for the architecture
        changeType:
          type: string
          enum: [service-added, service-removed, service-modified, integration-changed, pattern-changed]
          description: Type of architectural change
        affectedServices:
          type: array
          items:
            type: string
          description: Services affected by the change
        architecture:
          type: string
          description: Updated architecture description
        previousArchitecture:
          type: string
          description: Previous architecture (for comparison)
        impact:
          type: string
          enum: [low, medium, high]
          description: Impact level of the change
        changedAt:
          type: string
          format: date-time
          description: When the architecture was changed
        changedBy:
          type: string
          description: User or system that changed the architecture
        triggerRegeneration:
          type: boolean
          description: Whether to trigger contract regeneration
      required:
        - architectureId
        - changeType
        - affectedServices
        - architecture
        - impact
        - changedAt
        - changedBy
        - triggerRegeneration

    ServiceDefinedPayload:
      type: object
      properties:
        serviceId:
          type: string
          format: uuid
          description: Unique identifier for the service
        serviceName:
          type: string
          description: Name of the service
        serviceType:
          type: string
          enum: [rest-api, event-driven, hybrid, cli, web-ui]
          description: Type of service
        requirements:
          type: string
          description: Service requirements
        architecture:
          type: string
          description: Service architecture description
        dependencies:
          type: array
          items:
            type: string
          description: Service dependencies
        priority:
          type: string
          enum: [low, medium, high, critical]
          description: Priority for contract generation
        definedAt:
          type: string
          format: date-time
          description: When the service was defined
        definedBy:
          type: string
          description: User or system that defined the service
        autoGenerateContract:
          type: boolean
          description: Whether to automatically generate contract
      required:
        - serviceId
        - serviceName
        - serviceType
        - requirements
        - priority
        - definedAt
        - definedBy
        - autoGenerateContract