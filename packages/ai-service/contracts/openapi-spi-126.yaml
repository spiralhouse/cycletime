          type: string
        requests:
          type: integer
        tokens:
          $ref: '#/components/schemas/TokenUsage'
        cost:
          type: number
        successRate:
          type: number
        averageResponseTime:
          type: number

    UsageDataPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        requests:
          type: integer
        tokens:
          type: integer
        cost:
          type: number
        responseTime:
          type: number
        errorRate:
          type: number

    CostAnalyticsResponse:
      type: object
