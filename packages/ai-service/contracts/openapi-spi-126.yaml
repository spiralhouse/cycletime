        previousPeriod:
          type: number
        change:
          type: number
        changePercentage:
          type: number

    CostBreakdownItem:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        percentage:
          type: number
        requests:
          type: integer
        tokens:
          type: integer
        details:
          type: object

    CostTrends:
      type: object
      properties:
        daily:
          type: array
          items:
            $ref: '#/components/schemas/CostDataPoint'
        weekly:
          type: array
          items:
            $ref: '#/components/schemas/CostDataPoint'
        monthly:
          type: array
          items:
            $ref: '#/components/schemas/CostDataPoint'

    CostDataPoint:
      type: object
      properties:
        period:
          type: string
        amount:
          type: number
        requests:
          type: integer
        tokens:
          type: integer

    CostForecasts:
      type: object
      properties:
        nextPeriod:
          type: number
        confidence:
          type: number
        factors:
          type: array
          items:
            type: string

    PerformanceMetricsResponse:
      type: object
      properties:
        timeframe:
          type: string
        metrics:
          $ref: '#/components/schemas/MetricsCollection'
