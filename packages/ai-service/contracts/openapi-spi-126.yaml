          type: array
          items:
            $ref: '#/components/schemas/MetricAlert'
        generatedAt:
          type: string
          format: date-time
      required:
        - timeframe
        - metrics
        - generatedAt

    MetricsCollection:
      type: object
      properties:
        responseTime:
          $ref: '#/components/schemas/ResponseTimeMetrics'
        throughput:
          $ref: '#/components/schemas/ThroughputMetrics'
        errorRate:
          $ref: '#/components/schemas/ErrorRateMetrics'
        queueDepth:
          $ref: '#/components/schemas/QueueMetrics'
        providerHealth:
          type: array
          items:
            $ref: '#/components/schemas/ProviderHealthMetric'

    ResponseTimeMetrics:
      type: object
      properties:
        average:
          type: number
        median:
          type: number
        p95:
          type: number
        p99:
          type: number
        min:
          type: number
        max:
          type: number

    ThroughputMetrics:
      type: object
      properties:
        requestsPerSecond:
          type: number
        tokensPerSecond:
          type: number
        peakThroughput:
          type: number
        averageThroughput:
          type: number

    ErrorRateMetrics:
      type: object
      properties:
        overall:
          type: number
        byProvider:
          type: object
          additionalProperties:
            type: number
        byErrorType:
          type: object
          additionalProperties:
            type: number
        trend:
          type: string
          enum: [improving, stable, degrading]

    QueueMetrics:
      type: object
      properties:
        currentDepth:
          type: integer
        averageDepth:
          type: integer
        maxDepth:
          type: integer
        averageWaitTime:
          type: number
        maxWaitTime:
          type: number

    ProviderHealthMetric:
      type: object
      properties:
        providerId:
          type: string
        health:
          type: string
        responseTime:
          type: number
        availability:
          type: number
        lastCheck:
          type: string
          format: date-time

    MetricAlert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [threshold_exceeded, trend_alert, anomaly_detected]
        severity:
          type: string
          enum: [info, warning, error, critical]
        message:
          type: string
        metric:
          type: string
        currentValue:
          type: number
        threshold:
          type: number
        timestamp:
          type: string
          format: date-time

    # Administration Schemas
    ServiceHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        uptime:
          type: integer
          description: Uptime in seconds
        components:
          $ref: '#/components/schemas/ComponentsHealth'
        checks:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheck'
        dependencies:
          $ref: '#/components/schemas/DependenciesHealth'
      required:
        - status
        - timestamp
        - version
        - uptime
        - components

    ComponentsHealth:
      type: object
      properties:
        api:
          type: string
          enum: [healthy, degraded, unhealthy]
        database:
          type: string
          enum: [healthy, degraded, unhealthy]
        messageQueue:
          type: string
          enum: [healthy, degraded, unhealthy]
        providers:
          type: string
          enum: [healthy, degraded, unhealthy]
        eventService:
          type: string
          enum: [healthy, degraded, unhealthy]

    HealthCheck:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pass, warn, fail]
        time:
          type: string
          format: date-time
        output:
          type: string
        details:
          type: object

    DependenciesHealth:
      type: object
      properties:
        redis:
          $ref: '#/components/schemas/DependencyHealth'
        providers:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DependencyHealth'
        externalServices:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DependencyHealth'

    DependencyHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        responseTime:
          type: number
        lastCheck:
          type: string
          format: date-time
        error:
          type: string

    ServiceMetricsResponse:
      type: object
      properties:
        category:
          type: string
        metrics:
          oneOf:
            - $ref: '#/components/schemas/SystemMetrics'
            - $ref: '#/components/schemas/ApplicationMetrics'
            - $ref: '#/components/schemas/BusinessMetrics'
            - $ref: '#/components/schemas/SecurityMetrics'
        timestamp:
          type: string
          format: date-time
      required:
        - category
        - metrics
        - timestamp

    SystemMetrics:
      type: object
      properties:
        cpu:
          $ref: '#/components/schemas/CPUMetrics'
        memory:
          $ref: '#/components/schemas/MemoryMetrics'
        disk:
          $ref: '#/components/schemas/DiskMetrics'
        network:
          $ref: '#/components/schemas/NetworkMetrics'

    CPUMetrics:
      type: object
      properties:
        usage:
          type: number
          minimum: 0
          maximum: 100
        loadAverage:
          type: array
          items:
            type: number
        cores:
          type: integer

    MemoryMetrics:
      type: object
      properties:
        used:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        heap:
          type: object
          properties:
            used:
              type: integer
            total:
              type: integer

    DiskMetrics:
      type: object
      properties:
        used:
          type: integer
        total:
          type: integer
        percentage:
          type: number
        iops:
          type: number

    NetworkMetrics:
      type: object
      properties:
        bytesIn:
          type: integer
        bytesOut:
          type: integer
        packetsIn:
          type: integer
        packetsOut:
          type: integer
        connections:
          type: integer

    ApplicationMetrics:
      type: object
      properties:
        requests:
          $ref: '#/components/schemas/RequestMetrics'
        responses:
          $ref: '#/components/schemas/ResponseMetrics'
        queue:
          $ref: '#/components/schemas/ApplicationQueueMetrics'
        cache:
          $ref: '#/components/schemas/CacheMetrics'

    RequestMetrics:
      type: object
      properties:
        total:
          type: integer
        perSecond:
          type: number
        byType:
          type: object
          additionalProperties:
            type: integer
        byProvider:
          type: object
          additionalProperties:
            type: integer

    ResponseMetrics:
      type: object
      properties:
        byStatus:
          type: object
          additionalProperties:
            type: integer
        averageTime:
          type: number
        responseTimeDistribution:
          type: object
          properties:
            p50:
              type: number
            p90:
              type: number
            p95:
              type: number
            p99:
              type: number

    ApplicationQueueMetrics:
      type: object
      properties:
        depth:
          type: integer
        processed:
          type: integer
        failed:
          type: integer
        averageWaitTime:
          type: number

    CacheMetrics:
      type: object
      properties:
        hits:
          type: integer
        misses:
          type: integer
        hitRate:
          type: number
        size:
          type: integer

    BusinessMetrics:
      type: object
      properties:
        activeUsers:
          type: integer
        activeProjects:
          type: integer
        tokensProcessed:
          type: integer
        requestsSuccessful:
          type: integer
        revenue:
          type: number
        topModels:
          type: array
          items:
            type: object
            properties:
              model:
                type: string
              requests:
                type: integer

    SecurityMetrics:
      type: object
      properties:
        authenticationAttempts:
          type: integer
        authenticationFailures:
          type: integer
        rateLimitHits:
          type: integer
        suspiciousActivity:
          type: integer
        blockedRequests:
          type: integer

    ConfigReloadRequest:
      type: object
      properties:
        components:
          type: array
          items:
            type: string
            enum: [providers, rate-limits, models, features, logging]
          description: Specific components to reload (all if not specified)
        validateOnly:
          type: boolean
          default: false
          description: Only validate configuration without applying changes
        forceReload:
          type: boolean
          default: false
          description: Force reload even if configuration hasn't changed

    ConfigReloadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentReloadResult'
        timestamp:
          type: string
          format: date-time
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
      required:
        - success
        - message
        - timestamp

    ComponentReloadResult:
      type: object
      properties:
        component:
          type: string
        success:
          type: boolean
        message:
          type: string
        changes:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    ValidationError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string

    # Response Schemas for AI Request Types
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        provider:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatChoice'
        usage:
          $ref: '#/components/schemas/UsageInfo'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
      required:
        - id
        - object
        - created
        - model
        - provider
        - choices
        - usage

    ChatChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finishReason:
          type: string
          enum: [stop, length, function_call, tool_calls, content_filter]
      required:
        - index
        - message
        - finishReason

    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmbeddingObject'
        model:
          type: string
        provider:
          type: string
        usage:
          $ref: '#/components/schemas/EmbeddingUsage'
      required:
        - object
        - data
        - model
        - provider
        - usage

    EmbeddingObject:
      type: object
      properties:
        object:
          type: string
          enum: [embedding]
        embedding:
          type: array
          items:
            type: number
        index:
          type: integer
      required:
        - object
        - embedding
        - index

    EmbeddingUsage:
      type: object
      properties:
        promptTokens:
          type: integer
        totalTokens:
          type: integer
        estimatedCost:
          type: number

    GenericAIResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        result:
          type: object
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
      required:
        - id
        - type
        - result

    ResponseMetadata:
      type: object
      properties:
        processingTime:
          type: number
        providerResponseTime:
          type: number
        contextOptimizationUsed:
          type: boolean
        originalContextTokens:
          type: integer
        optimizedContextTokens:
          type: integer
        requestId:
          type: string
        correlationId:
          type: string

    # Request Body Schemas for different request types
    ChatCompletionRequestBody:
      allOf:
        - $ref: '#/components/schemas/CreateAIRequestBody'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'
            functions:
              type: array
              items:
                type: object
            tools:
              type: array
              items:
                type: object
            toolChoice:
              type: string
              enum: [auto, none]
          required:
            - messages

    EmbeddingRequestBody:
      allOf:
        - $ref: '#/components/schemas/CreateAIRequestBody'
        - type: object
          properties:
            input:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
            dimensions:
              type: integer
            encodingFormat:
              type: string
              enum: [float, base64]
          required:
            - input

    ContextAnalysisRequestBody:
      allOf:
        - $ref: '#/components/schemas/CreateAIRequestBody'
        - type: object
          properties:
            documents:
              type: array
              items:
                $ref: '#/components/schemas/DocumentInput'
            analysisType:
              type: string
              enum: [full, incremental, targeted]
          required:
            - documents

    ProjectAnalysisRequestBody:
      allOf:
        - $ref: '#/components/schemas/CreateAIRequestBody'
        - type: object
          properties:
            projectId:
              type: string
              format: uuid
            analysisType:
              type: string
              enum: [full, incremental, targeted]
            scope:
              type: array
              items:
                type: string
          required:
            - projectId

    DocumentInput:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        title:
          type: string
        type:
          type: string
        metadata:
          type: object
      required:
        - id
        - content
        - title
        - type

    # Common Error Response
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        requestId:
          type: string
        details:
          type: object
      required:
        - error
        - message
        - timestamp

# Rate Limiting
x-rateLimit:
  requests:
    window: 60s
    limit: 1000
  tokens:
    window: 60s  
    limit: 100000

# Additional API Documentation
x-tagGroups:
  - name: Core Operations
    tags:
      - AI Request Management
  - name: Management
    tags:
      - Provider Management
      - Administration
  - name: Analytics
    tags:
      - Usage Analytics