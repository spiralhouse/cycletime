version: '3.8'

services:
  ai-service:
    build:
      context: ../../
      dockerfile: packages/ai-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PORT=8003
      - HOST=0.0.0.0
      - LOG_LEVEL=debug
      - CORS_ORIGIN=*
      - RATE_LIMIT_MAX=1000
      - RATE_LIMIT_WINDOW=1 minute
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - ai-service-network
    volumes:
      - ./contracts:/app/packages/ai-service/contracts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-service-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes

networks:
  ai-service-network:
    driver: bridge

volumes:
  redis-data:
    driver: local