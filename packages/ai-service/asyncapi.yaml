      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProviderConfigurationUpdatedPayload'

    ProviderError:
      name: ProviderError
      title: Provider Error
      summary: A provider has encountered an error
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ProviderErrorPayload'

    ModelAvailabilityChanged:
      name: ModelAvailabilityChanged
