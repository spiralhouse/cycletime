      payload:
        $ref: '#/components/schemas/ContextAnalysisRequestedPayload'

    SystemConfigUpdated:
      name: SystemConfigUpdated
      title: System Config Updated
      summary: System configuration has been updated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SystemConfigUpdatedPayload'

  schemas:
    BaseEvent:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for the event
        eventType:
          type: string
          description: Type of the event
        timestamp:
          type: string
          format: date-time
          description: When the event occurred
        source:
          type: string
          description: Service that generated the event
          default: ai-service
        version:
          type: string
          description: Event schema version
          default: "1.0.0"
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracking related events
        metadata:
          type: object
          description: Additional event metadata
          properties:
            userId:
              type: string
            sessionId:
              type: string
            projectId:
              type: string
            requestId:
              type: string
      required:
        - eventId
        - eventType
        - timestamp
        - source
        - version

    AiRequestReceivedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            requestId:
              type: string
              format: uuid
            requestType:
              type: string
              enum: [chat_completion, embedding, analysis]
            provider:
              type: string
              enum: [openai, anthropic, google, azure]
            model:
              type: string
            tokens:
              type: object
              properties:
                estimated:
                  type: integer
                maxTokens:
                  type: integer
            priority:
              type: string
              enum: [low, medium, high, urgent]
            queuePosition:
              type: integer
          required:
            - requestId
            - requestType

    AiRequestProcessingPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            requestId:
              type: string
              format: uuid
            provider:
              type: string
              enum: [openai, anthropic, google, azure]
            model:
              type: string
            processingStarted:
              type: string
              format: date-time
            estimatedCompletion:
              type: string
              format: date-time
            contextOptimization:
              type: object
              properties:
                enabled:
                  type: boolean
                originalTokens:
                  type: integer
                optimizedTokens:
                  type: integer
          required:
            - requestId
            - provider
            - model
            - processingStarted

    AiRequestCompletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            requestId:
              type: string
              format: uuid
            provider:
              type: string
              enum: [openai, anthropic, google, azure]
            model:
              type: string
            processingTime:
              type: number
              description: Processing time in milliseconds
            tokens:
              type: object
              properties:
                prompt:
                  type: integer
                completion:
                  type: integer
                total:
                  type: integer
            cost:
              type: number
            quality:
              type: object
              properties:
                score:
                  type: number
                  minimum: 0
                  maximum: 1
                feedback:
                  type: string
          required:
            - requestId
            - provider
            - model
            - processingTime
            - tokens

    AiRequestFailedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            requestId:
              type: string
              format: uuid
            provider:
              type: string
              enum: [openai, anthropic, google, azure]
            model:
              type: string
            error:
              type: object
              properties:
                type:
                  type: string
                  enum: [rate_limit, authentication, model_error, network_error, internal_error]
                message:
                  type: string
                code:
                  type: string
                details:
                  type: object
            processingTime:
              type: number
            retryable:
              type: boolean
            retryAttempt:
              type: integer
          required:
            - requestId
            - error

    AiResponseGeneratedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            requestId:
              type: string
              format: uuid
            responseId:
              type: string
              format: uuid
            provider:
              type: string
              enum: [openai, anthropic, google, azure]
            model:
              type: string
            responseLength:
              type: integer
            tokens:
              type: object
              properties:
                generated:
                  type: integer
                total:
                  type: integer
            quality:
              type: object
              properties:
                coherence:
                  type: number
                relevance:
                  type: number
                accuracy:
                  type: number
            finishReason:
              type: string
              enum: [stop, length, function_call, tool_calls, content_filter]
          required:
            - requestId
            - responseId
            - provider
            - model
            - responseLength
            - tokens

    ContextAnalysisStartedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            contextId:
              type: string
              format: uuid
            documentsCount:
              type: integer
            analysisType:
              type: string
              enum: [full, incremental, targeted]
            estimatedCompletion:
              type: string
              format: date-time
            configuration:
              type: object
              properties:
                chunkingStrategy:
                  type: string
                targetModel:
                  type: string
                maxChunkSize:
                  type: integer
          required:
            - contextId
            - documentsCount
            - analysisType

    ContextAnalysisCompletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            contextId:
              type: string
              format: uuid
            documentsCount:
              type: integer
            chunksGenerated:
              type: integer
            totalTokens:
              type: integer
            processingTime:
              type: number
            quality:
              type: object
              properties:
                averageRelevance:
                  type: number
                  minimum: 0
                  maximum: 1
                chunksOptimized:
                  type: integer
                tokensReduced:
                  type: integer
          required:
            - contextId
            - documentsCount
            - chunksGenerated
            - totalTokens
            - processingTime

    ContextOptimizationResultsPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            contextId:
              type: string
