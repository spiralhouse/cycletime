  publishEmbeddingCompletion:
    action: send
    channel:
      $ref: '#/channels/ai~1embedding~1completion'
    summary: Publish embedding completion event
    description: Publishes an event when embeddings are generated

  publishUsageTracking:
    action: send
    channel:
      $ref: '#/channels/ai~1usage~1tracking'
    summary: Publish usage tracking event
    description: Publishes an event when AI usage is tracked

  publishRateLimitStatus:
    action: send
    channel:
      $ref: '#/channels/ai~1rate~1limit~1status'
    summary: Publish rate limit status event
    description: Publishes an event when rate limit status changes

  publishServiceHealthCheck:
    action: send
    channel:
      $ref: '#/channels/ai~1service~1health~1check'
    summary: Publish service health check event
