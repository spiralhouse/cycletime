asyncapi: 3.0.0
info:
  title: AI Service Events API
  version: 1.0.0
  description: |
    Comprehensive AsyncAPI specification for AI Service event-driven communication.
    
    **Published Events (25 types):**
    - AI Request Lifecycle: received, processing, completed, failed, response generated
    - Context Management: analysis started/completed, optimization results
    - Provider Management: health changes, configuration, errors, connection status
    - Project Analysis: started, completed, insights/recommendations generated
    - Embedding Generation: embedding completion events
    - Usage & Monitoring: usage tracking, threshold alerts, rate limits
    - Service Health: health checks, service-level errors, shutdown notifications
    - Model Management: availability changes
    
    **Consumed Events (6 types):**
    - Project Management: created, updated, deleted
    - Context Management: updated, analysis requested
    - System Configuration: config updates
    
    **Message Broker Support:**
    - Primary: Redis pub/sub (production)
    - Fallback: In-memory EventEmitter (development)
    - Dual server configuration for development and production environments
    
    Events enable real-time monitoring, analytics, workflow automation, and
    service integration across the CycleTime platform.
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  development:
    host: localhost:6379
    protocol: redis
    description: Development Redis server
  production:
    host: redis.cycletime.dev:6379
    protocol: redis
    description: Production Redis server

defaultContentType: application/json

channels:
  ai/request/received:
    description: Published when an AI request is received
    messages:
      aiRequestReceived:
        $ref: '#/components/messages/AiRequestReceived'

  ai/request/processing:
    description: Published when an AI request starts processing
    messages:
      aiRequestProcessing:
        $ref: '#/components/messages/AiRequestProcessing'

  ai/request/completed:
    description: Published when an AI request is completed successfully
    messages:
      aiRequestCompleted:
        $ref: '#/components/messages/AiRequestCompleted'

  ai/request/failed:
    description: Published when an AI request fails
    messages:
      aiRequestFailed:
        $ref: '#/components/messages/AiRequestFailed'

  ai/response/generated:
    description: Published when an AI response is generated
    messages:
      aiResponseGenerated:
        $ref: '#/components/messages/AiResponseGenerated'

  ai/context/analysis/started:
    description: Published when context analysis starts
    messages:
      contextAnalysisStarted:
        $ref: '#/components/messages/ContextAnalysisStarted'

  ai/context/analysis/completed:
    description: Published when context analysis completes
    messages:
      contextAnalysisCompleted:
        $ref: '#/components/messages/ContextAnalysisCompleted'

  ai/context/optimization/results:
    description: Published when context optimization completes
    messages:
      contextOptimizationResults:
        $ref: '#/components/messages/ContextOptimizationResults'

  ai/provider/health/changed:
    description: Published when provider health status changes
    messages:
      providerHealthChanged:
        $ref: '#/components/messages/ProviderHealthChanged'

  ai/provider/configuration/updated:
    description: Published when a provider is configured
    messages:
      providerConfigurationUpdated:
        $ref: '#/components/messages/ProviderConfigurationUpdated'

  ai/provider/error:
    description: Published when a provider encounters an error
    messages:
      providerError:
        $ref: '#/components/messages/ProviderError'

  ai/model/availability/changed:
    description: Published when model availability changes
    messages:
      modelAvailabilityChanged:
        $ref: '#/components/messages/ModelAvailabilityChanged'

  ai/project/analysis/started:
    description: Published when project analysis starts
    messages:
      projectAnalysisStarted:
        $ref: '#/components/messages/ProjectAnalysisStarted'

  ai/project/analysis/completed:
    description: Published when project analysis completes
    messages:
      projectAnalysisCompleted:
        $ref: '#/components/messages/ProjectAnalysisCompleted'

  ai/project/insights/generated:
    description: Published when project insights are generated
    messages:
      projectInsightsGenerated:
        $ref: '#/components/messages/ProjectInsightsGenerated'

  ai/project/recommendations/generated:
    description: Published when project recommendations are generated
    messages:
      projectRecommendationsGenerated:
        $ref: '#/components/messages/ProjectRecommendationsGenerated'

  ai/embedding/completion:
    description: Published when embeddings are generated
    messages:
      embeddingCompletion:
        $ref: '#/components/messages/EmbeddingCompletion'

  ai/usage/tracking:
    description: Published when AI usage is tracked
    messages:
      usageTracking:
        $ref: '#/components/messages/UsageTracking'

  ai/rate/limit/status:
    description: Published when rate limit is exceeded
    messages:
      rateLimitStatus:
        $ref: '#/components/messages/RateLimitStatus'

  ai/service/health/check:
    description: Published when service health changes
    messages:
      serviceHealthCheck:
        $ref: '#/components/messages/ServiceHealthCheck'

  ai/provider/connection/lost:
    description: Published when provider connection is lost
    messages:
      providerConnectionLost:
        $ref: '#/components/messages/ProviderConnectionLost'

  ai/provider/connection/restored:
    description: Published when provider connection is restored
    messages:
      providerConnectionRestored:
        $ref: '#/components/messages/ProviderConnectionRestored'

  ai/usage/threshold/reached:
    description: Published when usage threshold is exceeded
    messages:
      usageThresholdReached:
        $ref: '#/components/messages/UsageThresholdReached'

  ai/health/checked:
    description: Published when health check is performed
    messages:
      healthChecked:
        $ref: '#/components/messages/HealthChecked'

  ai/service/error:
    description: Published when service-level errors occur
    messages:
      serviceError:
        $ref: '#/components/messages/ServiceError'

  ai/service/shutdown:
    description: Published when service shutdown is initiated
    messages:
      serviceShutdown:
        $ref: '#/components/messages/ServiceShutdown'

  # Consumed Events
  project/created:
    description: Consumed when a new project is created
    messages:
      projectCreated:
        $ref: '#/components/messages/ProjectCreated'

  project/updated:
    description: Consumed when a project is updated
    messages:
      projectUpdated:
        $ref: '#/components/messages/ProjectUpdated'

  project/deleted:
    description: Consumed when a project is deleted
    messages:
      projectDeleted:
        $ref: '#/components/messages/ProjectDeleted'

  context/updated:
    description: Consumed when project context is updated
    messages:
      contextUpdated:
        $ref: '#/components/messages/ContextUpdated'

  context/analysis/requested:
    description: Consumed when context analysis is requested
    messages:
      contextAnalysisRequested:
        $ref: '#/components/messages/ContextAnalysisRequested'

  system/config/updated:
    description: Consumed when system configuration is updated
    messages:
      systemConfigUpdated:
        $ref: '#/components/messages/SystemConfigUpdated'

operations:
  publishAiRequestReceived:
    action: send
    channel:
      $ref: '#/channels/ai~1request~1received'
    summary: Publish AI request received event
    description: Publishes an event when an AI request is received by the service

  publishAiRequestProcessing:
