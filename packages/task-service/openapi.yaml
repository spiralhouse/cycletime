openapi: 3.0.3
info:
  title: Task Service API
  description: Task lifecycle management service with dependency tracking, scheduling, and execution monitoring
  version: 1.0.0
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  - url: http://localhost:8005
    description: Development server
  - url: https://api.cycletime.dev/tasks
    description: Production server

paths:
  /health:
    get:
      summary: Health check
      description: Check if the task service is healthy and operational
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/tasks:
    get:
      summary: List tasks
      description: Get a paginated list of tasks with optional filtering
      operationId: listTasks
      tags:
        - Tasks
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of tasks per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search query for task title and description
          schema:
            type: string
        - name: status
          in: query
          description: Filter by task status
          schema:
            type: string
            enum: [pending, in_progress, completed, failed, cancelled, blocked]
        - name: priority
          in: query
          description: Filter by task priority
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: assignee
          in: query
          description: Filter by assignee ID
          schema:
            type: string
            format: uuid
        - name: project
          in: query
          description: Filter by project ID
          schema:
            type: string
            format: uuid
        - name: dueDate
          in: query
          description: Filter by due date (ISO 8601 format)
          schema:
            type: string
            format: date
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          schema:
            type: string
        - name: sortBy
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, updatedAt, dueDate, priority, status, title]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create task
      description: Create a new task
      operationId: createTask
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}:
    get:
      summary: Get task
      description: Get task details and metadata
      operationId: getTask
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
        - name: includeHistory
          in: query
          description: Include task history in response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update task
      description: Update task details and metadata
      operationId: updateTask
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task conflict (version mismatch)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete task
      description: Delete a task (soft delete by default)
      operationId: deleteTask
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
        - name: permanent
          in: query
          description: Permanently delete the task
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Task deleted successfully
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/assign:
    post:
      summary: Assign task
      description: Assign a task to a user
      operationId: assignTask
      tags:
        - Task Assignment
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTaskRequest'
      responses:
        '200':
          description: Task assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/unassign:
    post:
      summary: Unassign task
      description: Unassign a task from its current assignee
      operationId: unassignTask
      tags:
        - Task Assignment
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task unassigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/dependencies:
    get:
      summary: Get task dependencies
      description: Get all dependencies for a task
      operationId: getTaskDependencies
      tags:
        - Dependencies
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          description: Filter by dependency type
          schema:
            type: string
            enum: [blocks, depends_on, subtask, parent]
      responses:
        '200':
          description: Task dependencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDependenciesResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Add task dependency
      description: Add a dependency between tasks
      operationId: addTaskDependency
      tags:
        - Dependencies
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDependencyRequest'
      responses:
        '201':
          description: Dependency added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDependencyResponse'
        '400':
          description: Invalid request or circular dependency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/dependencies/{dependencyId}:
    delete:
      summary: Remove task dependency
      description: Remove a dependency between tasks
      operationId: removeTaskDependency
      tags:
        - Dependencies
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
        - name: dependencyId
          in: path
          required: true
          description: Dependency ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Dependency removed successfully
        '404':
          description: Task or dependency not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/schedule:
    get:
      summary: Get task schedule
      description: Get scheduling information for a task
      operationId: getTaskSchedule
      tags:
        - Scheduling
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task schedule information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskScheduleResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Schedule task
      description: Schedule a task for execution
      operationId: scheduleTask
      tags:
        - Scheduling
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleTaskRequest'
      responses:
        '200':
          description: Task scheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskScheduleResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/progress:
    get:
      summary: Get task progress
      description: Get progress tracking information for a task
      operationId: getTaskProgress
      tags:
        - Progress Tracking
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task progress information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Update task progress
      description: Update progress tracking for a task
      operationId: updateTaskProgress
      tags:
        - Progress Tracking
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgressRequest'
      responses:
        '200':
          description: Progress updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/search:
    post:
      summary: Search tasks
      description: Advanced task search with filters and facets
      operationId: searchTasks
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTasksRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchTasksResponse'
        '400':
          description: Invalid search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/analytics:
    get:
      summary: Get task analytics
      description: Get analytics and metrics for tasks
      operationId: getTaskAnalytics
      tags:
        - Analytics
      parameters:
        - name: timeRange
          in: query
          description: Time range for analytics
          schema:
            type: string
            enum: [day, week, month, quarter, year]
            default: week
        - name: groupBy
          in: query
          description: Group analytics by field
          schema:
            type: string
            enum: [status, priority, assignee, project, tag]
            default: status
        - name: project
          in: query
          description: Filter by project ID
          schema:
            type: string
            format: uuid
        - name: assignee
          in: query
          description: Filter by assignee ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAnalyticsResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/analyze:
    post:
      summary: AI-assisted task analysis
      description: Analyze task complexity, identify risks, and get AI-powered insights
      operationId: analyzeTask
      tags:
        - AI Analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskAnalysisRequest'
      responses:
        '200':
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAnalysisResponse'
        '400':
          description: Invalid analysis request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Analysis failed due to insufficient data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/breakdown:
    get:
      summary: Get task breakdown
      description: Get AI-generated task breakdown with subtasks and dependencies
      operationId: getTaskBreakdown
      tags:
        - AI Analysis
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task breakdown retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskBreakdownResponse'
        '404':
          description: Task or breakdown not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create task breakdown
      description: Generate AI-assisted task breakdown with subtasks and dependencies
      operationId: createTaskBreakdown
      tags:
        - AI Analysis
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskBreakdownRequest'
      responses:
        '201':
          description: Task breakdown created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskBreakdownResponse'
        '400':
          description: Invalid breakdown request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Breakdown already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/estimate:
    post:
      summary: AI-assisted effort estimation
      description: Get AI-powered effort estimation for a task or set of tasks
      operationId: estimateTask
      tags:
        - AI Estimation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskEstimationRequest'
      responses:
        '200':
          description: Estimation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEstimationResponse'
        '400':
          description: Invalid estimation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Estimation failed due to insufficient data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/{taskId}/estimate:
    get:
      summary: Get task estimate
      description: Get existing effort estimate for a task
      operationId: getTaskEstimate
      tags:
        - AI Estimation
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task estimate retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEstimationResponse'
        '404':
          description: Task or estimate not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update task estimate
      description: Update or refine existing task estimate
      operationId: updateTaskEstimate
      tags:
        - AI Estimation
      parameters:
        - name: taskId
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskEstimateRequest'
      responses:
        '200':
          description: Task estimate updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEstimationResponse'
        '400':
          description: Invalid estimate update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task or estimate not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Estimate conflict (version mismatch)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/estimates/batch:
    get:
      summary: Get batch estimates
      description: Get effort estimates for multiple tasks
      operationId: getBatchEstimates
      tags:
        - AI Estimation
      parameters:
        - name: taskIds
          in: query
          required: true
          description: Comma-separated list of task IDs
          schema:
            type: string
        - name: includeDetails
          in: query
          description: Include detailed breakdown in response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Batch estimates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchEstimationResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or more tasks not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create batch estimates
      description: Generate effort estimates for multiple tasks
      operationId: createBatchEstimates
      tags:
        - AI Estimation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchEstimationRequest'
      responses:
        '201':
          description: Batch estimates created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchEstimationResponse'
        '400':
          description: Invalid batch estimation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Estimation failed for one or more tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/dependencies/analyze:
    get:
      summary: Analyze dependencies
      description: Analyze task dependencies and detect potential issues
      operationId: analyzeDependencies
      tags:
        - AI Analysis
      parameters:
        - name: projectId
          in: query
          description: Filter by project ID
          schema:
            type: string
            format: uuid
        - name: taskIds
          in: query
          description: Comma-separated list of task IDs to analyze
          schema:
            type: string
        - name: includeRecommendations
          in: query
          description: Include AI-generated recommendations
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Dependency analysis completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyAnalysisResponse'
        '400':
          description: Invalid analysis request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/dependencies/validate:
    post:
      summary: Validate dependencies
      description: Validate proposed task dependencies for conflicts and cycles
      operationId: validateDependencies
      tags:
        - AI Analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DependencyValidationRequest'
      responses:
        '200':
          description: Dependency validation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyValidationResponse'
        '400':
          description: Invalid validation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tasks/templates:
    get:
      summary: Get task templates
      description: Get available task templates for task creation
      operationId: getTaskTemplates
      tags:
        - Templates
      parameters:
        - name: category
          in: query
          description: Filter by template category
          schema:
            type: string
            enum: [feature, bug, maintenance, research, documentation]
        - name: search
          in: query
          description: Search templates by name or description
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of templates per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskTemplateListResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create task template
      description: Create a new task template
      operationId: createTaskTemplate
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskTemplateRequest'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
