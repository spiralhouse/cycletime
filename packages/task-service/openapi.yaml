        - taskId
        - dependencies

    TaskDependencyResponse:
      type: object
      properties:
        dependency:
          $ref: '#/components/schemas/TaskDependency'
      required:
        - dependency

    AddDependencyRequest:
      type: object
      properties:
        type:
          type: string
          enum: [blocks, depends_on, subtask, parent]
        targetTaskId:
          type: string
          format: uuid
        comment:
          type: string
          nullable: true
      required:
        - type
        - targetTaskId

    TaskSchedule:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date-time
