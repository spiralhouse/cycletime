        dueDate:
          type: string
          format: date-time
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        recurringPattern:
          type: string
          nullable: true
        nextExecution:
          type: string
          format: date-time
          nullable: true
        executionHistory:
          type: array
          items:
            type: object
            properties:
              executedAt:
                type: string
                format: date-time
              status:
                type: string
