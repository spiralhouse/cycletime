              result:
                type: string
                nullable: true
      required:
        - taskId

    TaskScheduleResponse:
      type: object
      properties:
        schedule:
          $ref: '#/components/schemas/TaskSchedule'
      required:
        - schedule

    ScheduleTaskRequest:
      type: object
      properties:
        startDate:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        recurringPattern:
          type: string
          nullable: true
