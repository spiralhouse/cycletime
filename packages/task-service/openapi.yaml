components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        dependencies:
          type: object
          properties:
            redis:
              type: string
              enum: [healthy, degraded, unhealthy]
            queue:
              type: string
              enum: [healthy, degraded, unhealthy]
            scheduler:
              type: string
              enum: [healthy, degraded, unhealthy]
        metrics:
          type: object
          properties:
            tasksCount:
              type: integer
            pendingTasks:
              type: integer
            completedTasks:
              type: integer
            averageCompletionTime:
              type: number
      required:
        - status
        - timestamp
        - version

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled, blocked]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        type:
          type: string
          enum: [feature, bug, maintenance, research, documentation]
        estimatedHours:
          type: number
          minimum: 0
        actualHours:
          type: number
          minimum: 0
        progress:
          type: number
          minimum: 0
          maximum: 100
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        assignee:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
          nullable: true
        project:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
          nullable: true
        dependencies:
          type: object
          properties:
            blocks:
              type: array
              items:
                type: string
                format: uuid
            dependsOn:
              type: array
              items:
                type: string
                format: uuid
            subtasks:
              type: array
              items:
                type: string
                format: uuid
            parent:
              type: string
              format: uuid
              nullable: true
        schedule:
          type: object
          properties:
            startDate:
              type: string
              format: date-time
              nullable: true
            dueDate:
              type: string
              format: date-time
              nullable: true
            scheduledAt:
              type: string
              format: date-time
              nullable: true
            recurringPattern:
              type: string
              nullable: true
        audit:
          type: object
          properties:
            createdBy:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedBy:
              type: string
              format: uuid
            updatedAt:
              type: string
              format: date-time
            version:
              type: integer
        history:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              action:
                type: string
                enum: [created, updated, assigned, unassigned, completed, failed, cancelled]
              field:
                type: string
                nullable: true
              oldValue:
                type: string
                nullable: true
              newValue:
                type: string
                nullable: true
              timestamp:
                type: string
                format: date-time
              userId:
                type: string
                format: uuid
              comment:
                type: string
                nullable: true
      required:
        - id
        - title
        - status
        - priority
        - type
        - audit

    TaskResponse:
      type: object
      properties:
        task:
          $ref: '#/components/schemas/Task'
      required:
        - task

    TaskListResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
            hasNext:
              type: boolean
            hasPrevious:
              type: boolean
        filters:
          type: object
          properties:
            status:
              type: string
            priority:
              type: string
            assignee:
              type: string
            project:
              type: string
            search:
              type: string
        facets:
          type: object
          properties:
            statuses:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                  count:
                    type: integer
            priorities:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                  count:
                    type: integer
      required:
        - tasks
        - pagination

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
        type:
          type: string
          enum: [feature, bug, maintenance, research, documentation]
          default: feature
        estimatedHours:
          type: number
          minimum: 0
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        assigneeId:
          type: string
          format: uuid
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
      required:
        - title
        - type

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled, blocked]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        type:
          type: string
          enum: [feature, bug, maintenance, research, documentation]
        estimatedHours:
          type: number
          minimum: 0
        actualHours:
          type: number
          minimum: 0
        progress:
          type: number
          minimum: 0
          maximum: 100
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        assigneeId:
          type: string
          format: uuid
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
