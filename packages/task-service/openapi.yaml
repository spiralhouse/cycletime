          format: uuid
        type:
          type: string
          enum: [blocks, depends_on, subtask, parent]
        sourceTaskId:
          type: string
          format: uuid
        targetTaskId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
      required:
        - id
        - type
