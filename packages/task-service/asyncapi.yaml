  schemas:
    BaseEventPayload:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for the event
        eventType:
          type: string
          description: Type of the event
        timestamp:
          type: string
          format: date-time
          description: When the event occurred
        source:
          type: string
          description: Source service that generated the event
          default: task-service
        version:
          type: string
          description: Event schema version
          default: "1.0"
        userId:
          type: string
          format: uuid
          description: User who triggered the event
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing
        metadata:
          type: object
          description: Additional event metadata
      required:
        - eventId
        - eventType
        - timestamp
        - source
        - version

    TaskCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.created]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                priority:
                  type: string
                type:
                  type: string
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
                project:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                  nullable: true
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                estimatedHours:
                  type: number
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
              required:
                - taskId
                - title
                - status
                - priority
                - type
          required:
            - data

    TaskUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.updated]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                changes:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      oldValue:
                        type: string
                        nullable: true
                      newValue:
                        type: string
                        nullable: true
                currentState:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    status:
                      type: string
                    priority:
                      type: string
                    progress:
                      type: number
                    assignee:
                      type: object
                      nullable: true
                    dueDate:
                      type: string
                      format: date-time
                      nullable: true
              required:
                - taskId
                - changes
                - currentState
          required:
            - data

    TaskDeletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.deleted]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                title:
                  type: string
                permanent:
                  type: boolean
                  description: Whether the task was permanently deleted
                deletedAt:
                  type: string
                  format: date-time
              required:
                - taskId
                - title
                - permanent
                - deletedAt
          required:
            - data

    TaskAssignedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.assigned]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                previousAssignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
                comment:
                  type: string
                  nullable: true
              required:
                - taskId
                - taskTitle
                - assignee
          required:
            - data

    TaskUnassignedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.unassigned]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                previousAssignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
              required:
                - taskId
                - taskTitle
                - previousAssignee
          required:
            - data

    TaskStatusChangedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.status_changed]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                oldStatus:
                  type: string
                newStatus:
                  type: string
                statusChangedAt:
                  type: string
                  format: date-time
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
              required:
                - taskId
                - taskTitle
                - oldStatus
                - newStatus
                - statusChangedAt
          required:
            - data

    TaskPriorityChangedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.priority_changed]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                oldPriority:
                  type: string
                newPriority:
                  type: string
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
              required:
                - taskId
                - taskTitle
                - oldPriority
                - newPriority
          required:
            - data

    TaskProgressUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.progress_updated]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                oldProgress:
                  type: number
                newProgress:
                  type: number
                timeSpent:
                  type: number
                  nullable: true
                comment:
                  type: string
                  nullable: true
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
              required:
                - taskId
                - taskTitle
                - oldProgress
                - newProgress
          required:
            - data

    TaskCompletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.completed]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                completedAt:
                  type: string
                  format: date-time
                completionTime:
                  type: number
                  description: Time taken to complete in hours
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
                project:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                  nullable: true
                actualHours:
                  type: number
                  nullable: true
                estimatedHours:
                  type: number
                  nullable: true
              required:
                - taskId
                - taskTitle
                - completedAt
          required:
            - data

    TaskFailedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.failed]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                failedAt:
                  type: string
                  format: date-time
                reason:
                  type: string
                  nullable: true
                errorDetails:
                  type: object
                  nullable: true
                assignee:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
                  nullable: true
                retryCount:
                  type: integer
                  default: 0
              required:
                - taskId
                - taskTitle
                - failedAt
          required:
            - data

    TaskOverduePayload:
      allOf:
        - $ref: '#/components/schemas/BaseEventPayload'
        - type: object
          properties:
            eventType:
              type: string
              enum: [task.overdue]
            data:
              type: object
              properties:
                taskId:
                  type: string
                  format: uuid
                taskTitle:
                  type: string
                dueDate:
                  type: string
