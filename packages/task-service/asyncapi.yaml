asyncapi: 3.0.0
info:
  title: Task Service Events
  description: Task lifecycle management events for real-time notifications and integrations
  version: 1.0.0
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  development:
    host: localhost:6379
    protocol: redis
    description: Development Redis server
  production:
    host: redis.cycletime.dev:6379
    protocol: redis
    description: Production Redis server

