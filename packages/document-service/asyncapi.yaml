  correlationIds:
    documentCorrelation:
      description: Correlation ID for tracking document lifecycle events
      location: $message.payload.correlationId

    userCorrelation:
      description: Correlation ID for tracking user-related events
      location: $message.payload.metadata.userId

    projectCorrelation:
      description: Correlation ID for tracking project-related events
      location: $message.payload.metadata.projectId