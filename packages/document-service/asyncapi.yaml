  publishDocumentCommentDeleted:
    action: send
    channel:
      $ref: '#/channels/documents~1comment~1deleted'
    summary: Publish document comment deleted event
    description: Publishes an event when a document comment is deleted

  publishDocumentUploaded:
    action: send
    channel:
      $ref: '#/channels/documents~1uploaded'
    summary: Publish document uploaded event
    description: Publishes an event when a document file is uploaded

  publishDocumentDownloaded:
    action: send
    channel:
      $ref: '#/channels/documents~1downloaded'
    summary: Publish document downloaded event
    description: Publishes an event when a document is downloaded

  publishDocumentProcessed:
    action: send
    channel:
      $ref: '#/channels/documents~1processed'
    summary: Publish document processed event
    description: Publishes an event when document processing is completed

  publishDocumentIndexed:
    action: send
    channel:
      $ref: '#/channels/documents~1indexed'
    summary: Publish document indexed event
    description: Publishes an event when a document is indexed for search

  publishDocumentSearchPerformed:
    action: send
