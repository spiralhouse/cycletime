        $ref: '#/components/schemas/DocumentCreatedPayload'

    DocumentUpdated:
      name: DocumentUpdated
      title: Document Updated
      summary: A document has been updated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentUpdatedPayload'

    DocumentDeleted:
      name: DocumentDeleted
      title: Document Deleted
      summary: A document has been deleted
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentDeletedPayload'

    DocumentRestored:
      name: DocumentRestored
      title: Document Restored
      summary: A deleted document has been restored
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DocumentRestoredPayload'

    DocumentVersionCreated:
