asyncapi: 3.0.0
info:
  title: Document Service Events API
  version: 1.0.0
  description: |
    Events published by the Document Service for real-time notifications and system integration.
    
    This service publishes events for:
    - Document lifecycle (created, updated, deleted)
    - Version management (version created, version compared)
    - Collaboration (shared, unshared, commented)
    - File operations (uploaded, downloaded, processed)
    - Search indexing (indexed, index updated)
    - Permissions (granted, revoked, updated)
    
    Events are published to Redis channels and can be consumed by other services
    for monitoring, analytics, search indexing, and workflow automation.
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  development:
    host: localhost:6379
    protocol: redis
    description: Development Redis server
  production:
    host: redis.cycletime.dev:6379
    protocol: redis
    description: Production Redis server

defaultContentType: application/json

channels:
  documents/created:
    description: Published when a new document is created
    messages:
      documentCreated:
        $ref: '#/components/messages/DocumentCreated'

  documents/updated:
    description: Published when a document is updated
    messages:
      documentUpdated:
        $ref: '#/components/messages/DocumentUpdated'

  documents/deleted:
    description: Published when a document is deleted
    messages:
      documentDeleted:
        $ref: '#/components/messages/DocumentDeleted'

  documents/restored:
    description: Published when a deleted document is restored
    messages:
      documentRestored:
        $ref: '#/components/messages/DocumentRestored'

  documents/version/created:
    description: Published when a new document version is created
    messages:
      documentVersionCreated:
        $ref: '#/components/messages/DocumentVersionCreated'

  documents/version/compared:
    description: Published when document versions are compared
    messages:
      documentVersionsCompared:
        $ref: '#/components/messages/DocumentVersionsCompared'

  documents/shared:
    description: Published when a document is shared
    messages:
      documentShared:
        $ref: '#/components/messages/DocumentShared'

  documents/unshared:
    description: Published when document sharing is revoked
    messages:
      documentUnshared:
        $ref: '#/components/messages/DocumentUnshared'

  documents/permissions/updated:
    description: Published when document permissions are updated
    messages:
      documentPermissionsUpdated:
        $ref: '#/components/messages/DocumentPermissionsUpdated'

  documents/commented:
    description: Published when a comment is added to a document
    messages:
      documentCommented:
        $ref: '#/components/messages/DocumentCommented'

  documents/comment/updated:
    description: Published when a document comment is updated
    messages:
      documentCommentUpdated:
        $ref: '#/components/messages/DocumentCommentUpdated'

  documents/comment/deleted:
    description: Published when a document comment is deleted
    messages:
      documentCommentDeleted:
        $ref: '#/components/messages/DocumentCommentDeleted'

  documents/uploaded:
    description: Published when a document file is uploaded
    messages:
      documentUploaded:
        $ref: '#/components/messages/DocumentUploaded'

  documents/downloaded:
    description: Published when a document is downloaded
    messages:
      documentDownloaded:
        $ref: '#/components/messages/DocumentDownloaded'

  documents/processed:
    description: Published when document processing is completed
    messages:
      documentProcessed:
        $ref: '#/components/messages/DocumentProcessed'

  documents/indexed:
    description: Published when a document is indexed for search
    messages:
      documentIndexed:
        $ref: '#/components/messages/DocumentIndexed'

  documents/search/performed:
    description: Published when a document search is performed
    messages:
      documentSearchPerformed:
        $ref: '#/components/messages/DocumentSearchPerformed'

  documents/metadata/updated:
    description: Published when document metadata is updated
    messages:
      documentMetadataUpdated:
        $ref: '#/components/messages/DocumentMetadataUpdated'

  documents/analytics/updated:
    description: Published when document analytics are updated
    messages:
      documentAnalyticsUpdated:
        $ref: '#/components/messages/DocumentAnalyticsUpdated'

  documents/storage/moved:
    description: Published when a document is moved to different storage location
    messages:
      documentStorageMoved:
        $ref: '#/components/messages/DocumentStorageMoved'

  documents/virus/detected:
    description: Published when a virus is detected in a document
    messages:
      documentVirusDetected:
        $ref: '#/components/messages/DocumentVirusDetected'

  documents/processing/failed:
    description: Published when document processing fails
    messages:
      documentProcessingFailed:
        $ref: '#/components/messages/DocumentProcessingFailed'

  documents/quota/exceeded:
    description: Published when storage quota is exceeded
    messages:
      documentQuotaExceeded:
        $ref: '#/components/messages/DocumentQuotaExceeded'

operations:
  publishDocumentCreated:
    action: send
    channel:
      $ref: '#/channels/documents~1created'
    summary: Publish document created event
    description: Publishes an event when a new document is created

  publishDocumentUpdated:
