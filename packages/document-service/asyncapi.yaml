  schemas:
    BaseEvent:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for the event
        eventType:
          type: string
          description: Type of the event
        timestamp:
          type: string
          format: date-time
          description: When the event occurred
        source:
          type: string
          description: Service that generated the event
          default: document-service
        version:
          type: string
          description: Event schema version
          default: "1.0.0"
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracking related events
        metadata:
          type: object
          description: Additional event metadata
          properties:
            userId:
              type: string
              format: uuid
            sessionId:
              type: string
            projectId:
              type: string
              format: uuid
            requestId:
              type: string
            clientIp:
              type: string
            userAgent:
              type: string
      required:
        - eventId
        - eventType
        - timestamp
        - source
        - version

    DocumentCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            title:
              type: string
            type:
              type: string
            size:
              type: integer
            author:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            status:
              type: string
              enum: [draft, published]
            tags:
              type: array
              items:
                type: string
            permissions:
              type: object
              properties:
                public:
                  type: boolean
                readers:
                  type: array
                  items:
                    type: string
                    format: uuid
                writers:
                  type: array
                  items:
                    type: string
                    format: uuid
                admins:
                  type: array
                  items:
                    type: string
                    format: uuid
          required:
            - documentId
            - title
            - type
            - size
            - author
            - status

    DocumentUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            title:
              type: string
            previousVersion:
              type: string
            newVersion:
              type: string
            changes:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  oldValue:
                    type: string
                  newValue:
                    type: string
            updatedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
          required:
            - documentId
            - title
            - previousVersion
            - newVersion
            - changes
            - updatedBy

    DocumentDeletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            title:
              type: string
            type:
              type: string
            size:
              type: integer
            deletedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            permanent:
              type: boolean
            retentionPeriod:
              type: integer
              description: Days until permanent deletion
          required:
            - documentId
            - title
            - type
            - size
            - deletedBy
            - permanent

    DocumentRestoredPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            title:
              type: string
            type:
              type: string
            restoredBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            deletedAt:
              type: string
              format: date-time
          required:
            - documentId
            - title
            - type
            - restoredBy
            - deletedAt

    DocumentVersionCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            versionId:
              type: string
            version:
              type: string
            comment:
              type: string
            size:
              type: integer
            previousVersion:
              type: string
            changes:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [added, removed, modified]
                  path:
                    type: string
                  description:
                    type: string
            createdBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
          required:
            - documentId
            - versionId
            - version
            - size
            - createdBy

    DocumentVersionsComparedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            fromVersion:
              type: string
            toVersion:
              type: string
            comparedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            changesCount:
              type: integer
            similarityScore:
              type: number
              minimum: 0
              maximum: 1
          required:
            - documentId
            - fromVersion
            - toVersion
            - comparedBy
            - changesCount

    DocumentSharedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            shareId:
              type: string
              format: uuid
            sharedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            sharedWith:
              type: array
              items:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  groupId:
                    type: string
                    format: uuid
                  permissions:
                    type: array
                    items:
                      type: string
                      enum: [read, write, admin]
            permissions:
              type: array
              items:
                type: string
                enum: [read, write, admin]
            expiresAt:
              type: string
              format: date-time
              nullable: true
            message:
              type: string
          required:
            - documentId
            - shareId
            - sharedBy
            - sharedWith
            - permissions

    DocumentUnsharedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            shareId:
              type: string
              format: uuid
            unsharedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            unsharedFrom:
              type: array
              items:
                type: object
                properties:
                  userId:
                    type: string
                    format: uuid
                  groupId:
                    type: string
                    format: uuid
            reason:
              type: string
              enum: [manual, expired, policy]
          required:
            - documentId
            - shareId
            - unsharedBy
            - unsharedFrom
            - reason

    DocumentPermissionsUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            updatedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            previousPermissions:
              type: object
              properties:
                public:
                  type: boolean
                users:
                  type: array
                  items:
                    type: object
                    properties:
                      userId:
                        type: string
                        format: uuid
                      permissions:
                        type: array
                        items:
                          type: string
            newPermissions:
              type: object
              properties:
                public:
                  type: boolean
                users:
                  type: array
                  items:
                    type: object
                    properties:
                      userId:
                        type: string
                        format: uuid
                      permissions:
                        type: array
                        items:
                          type: string
          required:
            - documentId
            - updatedBy
            - previousPermissions
            - newPermissions

    DocumentCommentedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            commentId:
              type: string
              format: uuid
            content:
              type: string
            author:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            position:
              type: object
              properties:
                page:
                  type: integer
                x:
                  type: number
                y:
                  type: number
                selection:
                  type: string
              nullable: true
            parentId:
              type: string
              format: uuid
              nullable: true
            threadLength:
              type: integer
          required:
            - documentId
            - commentId
            - content
            - author
            - threadLength

    DocumentCommentUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            commentId:
              type: string
              format: uuid
            previousContent:
              type: string
            newContent:
              type: string
            updatedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            status:
              type: string
              enum: [active, resolved]
          required:
            - documentId
            - commentId
            - previousContent
            - newContent
            - updatedBy
            - status

    DocumentCommentDeletedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            commentId:
              type: string
              format: uuid
            content:
              type: string
            deletedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            threadLength:
              type: integer
          required:
            - documentId
            - commentId
            - content
            - deletedBy
            - threadLength

    DocumentUploadedPayload:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            documentId:
              type: string
              format: uuid
            filename:
              type: string
            originalName:
              type: string
            type:
              type: string
            mimeType:
              type: string
            size:
              type: integer
            checksum:
              type: string
            storageLocation:
              type: string
            uploadedBy:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
            uploadTime:
              type: number
              description: Upload time in milliseconds
            virusScanStatus:
              type: string
              enum: [pending, clean, infected, failed]
          required:
            - documentId
            - filename
            - originalName
            - type
            - mimeType
