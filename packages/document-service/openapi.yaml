openapi: 3.0.3
info:
  title: Document Service API
  description: Document lifecycle management service with version control, collaboration, and search integration
  version: 1.0.0
  contact:
    name: CycleTime Team
    email: team@cycletime.dev
  license:
    name: MIT

servers:
  - url: http://localhost:8004
    description: Development server
  - url: https://api.cycletime.dev/documents
    description: Production server

paths:
  /health:
    get:
      summary: Health check
      description: Check if the document service is healthy and operational
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/documents:
    get:
      summary: List documents
      description: Get a paginated list of documents with optional filtering
      operationId: listDocuments
      tags:
        - Documents
      parameters:
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of documents per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search query for document content and metadata
          schema:
            type: string
        - name: type
          in: query
          description: Filter by document type
          schema:
            type: string
            enum: [pdf, docx, txt, md, json, xml, html, csv, xlsx, pptx, image]
        - name: status
          in: query
          description: Filter by document status
          schema:
            type: string
            enum: [draft, published, archived, deleted]
        - name: tag
          in: query
          description: Filter by tag
          schema:
            type: string
        - name: author
          in: query
          description: Filter by author ID
          schema:
            type: string
            format: uuid
        - name: sortBy
          in: query
          description: Sort field
          schema:
            type: string
            enum: [createdAt, updatedAt, title, size, type]
            default: updatedAt
        - name: sortOrder
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create document
      description: Create a new document with metadata
      operationId: createDocument
      tags:
        - Documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Document already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}:
    get:
      summary: Get document
      description: Get document details and metadata
      operationId: getDocument
      tags:
        - Documents
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: includeContent
          in: query
          description: Include document content in response
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update document
      description: Update document metadata and content
      operationId: updateDocument
      tags:
        - Documents
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Document updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Document conflict (version mismatch)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete document
      description: Delete a document (soft delete by default)
      operationId: deleteDocument
      tags:
        - Documents
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: permanent
          in: query
          description: Permanently delete the document
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Document deleted successfully
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/content:
    get:
      summary: Get document content
      description: Download document content
      operationId: getDocumentContent
      tags:
        - Documents
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: version
          in: query
          description: Specific version to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Document content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/versions:
    get:
      summary: List document versions
      description: Get all versions of a document
      operationId: listDocumentVersions
      tags:
        - Version Management
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of versions per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of document versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionListResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create document version
      description: Create a new version of a document
      operationId: createDocumentVersion
      tags:
        - Version Management
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionRequest'
      responses:
        '201':
          description: Version created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/versions/{versionId}:
    get:
      summary: Get document version
      description: Get details of a specific document version
      operationId: getDocumentVersion
      tags:
        - Version Management
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: Version ID
          schema:
            type: string
      responses:
        '200':
          description: Document version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionResponse'
        '404':
          description: Document or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/versions/compare:
    post:
      summary: Compare document versions
      description: Compare two versions of a document
      operationId: compareDocumentVersions
      tags:
        - Version Management
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareVersionsRequest'
      responses:
        '200':
          description: Version comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionComparisonResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/share:
    post:
      summary: Share document
      description: Share a document with users or groups
      operationId: shareDocument
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareDocumentRequest'
      responses:
        '200':
          description: Document shared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/permissions:
    get:
      summary: Get document permissions
      description: Get permissions for a document
      operationId: getDocumentPermissions
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPermissionsResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update document permissions
      description: Update permissions for a document
      operationId: updateDocumentPermissions
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
      responses:
        '200':
          description: Permissions updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPermissionsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/comments:
    get:
      summary: Get document comments
      description: Get comments for a document
      operationId: getDocumentComments
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of comments per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Document comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCommentsResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Add document comment
      description: Add a comment to a document
      operationId: addDocumentComment
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Comment added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCommentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/comments/{commentId}:
    put:
      summary: Update document comment
      description: Update a document comment
      operationId: updateDocumentComment
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: commentId
          in: path
          required: true
          description: Comment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCommentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document or comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete document comment
      description: Delete a document comment
      operationId: deleteDocumentComment
      tags:
        - Collaboration
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: commentId
          in: path
          required: true
          description: Comment ID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Comment deleted successfully
        '404':
          description: Document or comment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/upload:
    post:
      summary: Upload document
      description: Upload a document file
      operationId: uploadDocument
      tags:
        - File Operations
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file to upload
                title:
                  type: string
                  description: Document title
                description:
                  type: string
                  description: Document description
                tags:
                  type: array
                  items:
                    type: string
                  description: Document tags
                metadata:
                  type: string
                  description: Additional metadata as JSON string
              required:
                - file
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Invalid request or file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/download:
    get:
      summary: Download document
      description: Download document file
      operationId: downloadDocument
      tags:
        - File Operations
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
        - name: version
          in: query
          description: Specific version to download
          schema:
            type: string
        - name: format
          in: query
          description: Convert to specific format (if supported)
          schema:
            type: string
            enum: [pdf, docx, txt, html, json]
      responses:
        '200':
          description: Document file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/search:
    post:
      summary: Search documents
      description: Advanced document search with filters and facets
      operationId: searchDocuments
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/documents/{documentId}/metadata:
    get:
      summary: Get document metadata
      description: Get detailed metadata for a document
      operationId: getDocumentMetadata
      tags:
        - Metadata
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMetadataResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update document metadata
      description: Update document metadata
      operationId: updateDocumentMetadata
      tags:
        - Metadata
      parameters:
        - name: documentId
          in: path
          required: true
          description: Document ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMetadataRequest'
      responses:
        '200':
          description: Metadata updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMetadataResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        dependencies:
          type: object
          properties:
            storage:
              type: string
              enum: [healthy, degraded, unhealthy]
            redis:
              type: string
              enum: [healthy, degraded, unhealthy]
            documentIndexing:
              type: string
              enum: [healthy, degraded, unhealthy]
        metrics:
          type: object
          properties:
            documentsCount:
              type: integer
            storageUsed:
              type: integer
            averageResponseTime:
              type: number
      required:
        - status
        - timestamp
        - version

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pdf, docx, txt, md, json, xml, html, csv, xlsx, pptx, image]
        mimeType:
          type: string
        size:
          type: integer
          description: File size in bytes
        status:
          type: string
          enum: [draft, published, archived, deleted]
        version:
          type: string
        checksum:
          type: string
          description: SHA-256 hash of the document content
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        storageLocation:
          type: string
          description: Internal storage location
        author:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
        permissions:
          type: object
          properties:
            public:
              type: boolean
            readers:
              type: array
              items:
                type: string
                format: uuid
            writers:
              type: array
              items:
                type: string
                format: uuid
            admins:
              type: array
              items:
                type: string
                format: uuid
        statistics:
          type: object
          properties:
            viewCount:
              type: integer
            downloadCount:
              type: integer
            commentCount:
              type: integer
            lastAccessed:
              type: string
              format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - type
        - mimeType
        - size
        - status
        - version
        - checksum
        - author
        - createdAt
        - updatedAt

    DocumentResponse:
      type: object
      properties:
        document:
          $ref: '#/components/schemas/Document'
        content:
          type: string
          description: Document content (only included if requested)
      required:
        - document

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
            hasNext:
              type: boolean
            hasPrevious:
              type: boolean
        filters:
          type: object
          properties:
            type:
              type: string
            status:
              type: string
            tag:
              type: string
            author:
              type: string
            search:
              type: string
        facets:
          type: object
          properties:
            types:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                  count:
                    type: integer
            statuses:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                  count:
                    type: integer
            tags:
              type: array
              items:
                type: object
                properties:
                  value:
                    type: string
                  count:
                    type: integer
      required:
        - documents
        - pagination

    CreateDocumentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [pdf, docx, txt, md, json, xml, html, csv, xlsx, pptx, image]
        content:
          type: string
          description: Document content (for text-based documents)
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        status:
          type: string
          enum: [draft, published]
          default: draft
      required:
        - title
        - type

    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        content:
          type: string
          description: Document content (for text-based documents)
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          description: Custom metadata fields
        status:
          type: string
          enum: [draft, published, archived]
        version:
          type: string
          description: Current version for optimistic locking

    DocumentVersion:
      type: object
      properties:
        id:
          type: string
