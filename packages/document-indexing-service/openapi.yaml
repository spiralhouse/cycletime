    SearchRequest:
      type: object
      properties:
        query:
          type: string
        indexId:
          type: string
        searchType:
          type: string
          enum: [semantic, keyword, hybrid]
          default: semantic
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        offset:
          type: integer
          minimum: 0
          default: 0
        threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
        filters:
          type: object
          properties:
            documentTypes:
              type: array
              items:
                type: string
            languages:
              type: array
              items:
                type: string
            authors:
              type: array
              items:
                type: string
            dateRange:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
            tags:
              type: array
              items:
                type: string
            metadata:
              type: object
            minWordCount:
              type: integer
            maxWordCount:
              type: integer
        sort:
          type: object
          properties:
            field:
              type: string
              enum: [relevance, date, title, wordCount]
              default: relevance
            order:
              type: string
              enum: [asc, desc]
              default: desc
        highlight:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            fields:
              type: array
              items:
                type: string
            fragmentSize:
              type: integer
              default: 150
            maxFragments:
              type: integer
              default: 3
            preTag:
              type: string
              default: <mark>
            postTag:
              type: string
              default: </mark>
        includeMetadata:
          type: boolean
          default: true
        includeChunks:
          type: boolean
          default: false
        boostFields:
          type: object
          additionalProperties:
            type: number
      required:
        - query

    SimilaritySearchRequest:
      type: object
      properties:
        embeddings:
          type: array
          items:
            type: number
        indexId:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
        includeMetadata:
          type: boolean
          default: true
