                type: integer
              chunkIndex:
                type: integer
              relevanceScore:
                type: number
        similarity:
          type: number
          minimum: 0
          maximum: 1
        relevanceScore:
          type: number
        matchType:
          type: string
          enum: [semantic, keyword, hybrid]
