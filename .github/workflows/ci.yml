name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cycletime_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install API Gateway dependencies
        run: |
          cd packages/api-gateway
          npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cycletime_test

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cycletime_test

      - name: Run root lint
        run: npm run lint

      - name: Run API Gateway type check
        run: |
          cd packages/api-gateway
          npm run typecheck

      - name: Run API Gateway lint
        run: |
          cd packages/api-gateway
          npm run lint

      - name: Run API Gateway tests
        run: |
          cd packages/api-gateway
          npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cycletime_test
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_REDIRECT_URI: http://localhost:3000/auth/callback
          JWT_SECRET: test_jwt_secret_that_is_long_enough_for_testing

      - name: Run API Gateway test coverage
        run: |
          cd packages/api-gateway
          npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cycletime_test
          GITHUB_CLIENT_ID: test_client_id
          GITHUB_CLIENT_SECRET: test_client_secret
          GITHUB_REDIRECT_URI: http://localhost:3000/auth/callback
          JWT_SECRET: test_jwt_secret_that_is_long_enough_for_testing

      - name: Upload coverage reports
        run: echo "Coverage reporting not yet configured - skipping for now"
